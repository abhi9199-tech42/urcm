<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320">
  <style>
    .box{fill:#f9fafb;stroke:#111;stroke-width:1}
    .label{font-family:Arial;font-size:12px;fill:#111}
    .title{font-family:Arial;font-size:14px;fill:#111}
    .arrow{stroke:#111;stroke-width:1;marker-end:url(#m)}
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#111"/>
    </marker>
  </defs>
  <text x="20" y="24" class="title">Fig 5 — Metacognition Controller</text>
  <rect x="60" y="80" width="160" height="50" class="box"/><text x="70" y="110" class="label">Inference State</text>
  <rect x="260" y="80" width="180" height="50" class="box"/><text x="270" y="110" class="label">Confusion Gate (H)</text>
  <rect x="480" y="80" width="200" height="50" class="box"/><text x="490" y="110" class="label">Convergence Reason</text>
  <rect x="720" y="80" width="160" height="50" class="box"/><text x="730" y="110" class="label">Control Signal</text>
  <line x1="220" y1="105" x2="260" y2="105" class="arrow"/>
  <line x1="440" y1="105" x2="480" y2="105" class="arrow"/>
  <line x1="680" y1="105" x2="720" y2="105" class="arrow"/>
</svg>
