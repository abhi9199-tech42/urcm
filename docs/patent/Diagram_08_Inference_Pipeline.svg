<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320">
  <style>
    .box{fill:#f9fafb;stroke:#111;stroke-width:1}
    .label{font-family:Arial;font-size:12px;fill:#111}
    .title{font-family:Arial;font-size:14px;fill:#111}
    .arrow{stroke:#111;stroke-width:1;marker-end:url(#m)}
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#111"/>
    </marker>
  </defs>
  <text x="20" y="24" class="title">Fig 8 — Inference Pipeline Flow</text>
  <rect x="60" y="80" width="100" height="50" class="box"/><text x="70" y="110" class="label">Input</text>
  <rect x="180" y="80" width="140" height="50" class="box"/><text x="190" y="110" class="label">Encode</text>
  <rect x="340" y="80" width="140" height="50" class="box"/><text x="350" y="110" class="label">Resonance</text>
  <rect x="500" y="80" width="140" height="50" class="box"/><text x="510" y="110" class="label">Logic</text>
  <rect x="660" y="80" width="160" height="50" class="box"/><text x="670" y="110" class="label">Metacognition</text>
  <rect x="840" y="80" width="100" height="50" class="box"/><text x="850" y="110" class="label">Output</text>
  <line x1="160" y1="105" x2="180" y2="105" class="arrow"/>
  <line x1="320" y1="105" x2="340" y2="105" class="arrow"/>
  <line x1="480" y1="105" x2="500" y2="105" class="arrow"/>
  <line x1="640" y1="105" x2="660" y2="105" class="arrow"/>
  <line x1="820" y1="105" x2="840" y2="105" class="arrow"/>
</svg>
