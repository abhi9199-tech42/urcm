<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360">
  <style>
    .box{fill:#f9fafb;stroke:#111;stroke-width:1}
    .title{font-family:Arial;font-size:14px;fill:#111}
    .label{font-family:Arial;font-size:12px;fill:#111}
    .arrow{stroke:#111;stroke-width:1;marker-end:url(#m)}
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#111"/>
    </marker>
  </defs>
  <text x="20" y="24" class="title">Fig 1 — Overall URCM Architecture</text>
  <rect x="40" y="80" width="120" height="50" class="box"/><text x="50" y="110" class="label">Input</text>
  <rect x="200" y="80" width="180" height="50" class="box"/><text x="210" y="110" class="label">Resonance Encoder</text>
  <rect x="420" y="80" width="140" height="50" class="box"/><text x="430" y="110" class="label">Reservoir</text>
  <rect x="600" y="80" width="160" height="50" class="box"/><text x="610" y="110" class="label">Working Memory</text>
  <rect x="200" y="180" width="160" height="50" class="box"/><text x="210" y="210" class="label">Logic Engine</text>
  <rect x="400" y="180" width="180" height="50" class="box"/><text x="410" y="210" class="label">Metacognition</text>
  <rect x="620" y="180" width="160" height="50" class="box"/><text x="630" y="210" class="label">Safety Governor</text>
  <rect x="800" y="80" width="120" height="50" class="box"/><text x="810" y="110" class="label">Output + μ</text>
  <line x1="160" y1="105" x2="200" y2="105" class="arrow"/>
  <line x1="380" y1="105" x2="420" y2="105" class="arrow"/>
  <line x1="560" y1="105" x2="600" y2="105" class="arrow"/>
  <line x1="760" y1="105" x2="800" y2="105" class="arrow"/>
  <line x1="480" y1="130" x2="480" y2="180" class="arrow"/>
  <line x1="280" y1="130" x2="280" y2="180" class="arrow"/>
  <line x1="680" y1="130" x2="680" y2="180" class="arrow"/>
</svg>
