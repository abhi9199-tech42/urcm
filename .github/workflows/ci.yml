name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-and-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run focused tests (telemetry/exporter)
        run: |
          pytest -q tests/test_observability_privacy_guardrail.py \
                     tests/test_convergence_telemetry.py \
                     tests/test_process_telemetry.py \
                     tests/test_metrics_exporter.py \
                     tests/test_metrics_labels_filter_health.py

      - name: Start metrics exporter
        env:
          URCM_ENV: ci
          URCM_METRICS_PORT: 8008
          URCM_METRICS_BIND: 127.0.0.1
          URCM_SLO_MIN_FINAL_MU: "0.0"
        run: |
          python -m urcm.ops.metrics_exporter &
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:8008/health && break || true
            sleep 0.5
          done
          curl -fsS http://127.0.0.1:8008/metrics || (echo "metrics not available" && exit 1)

      - name: Check health SLOs
        run: |
          python - << 'PY'
          import json, sys, urllib.request
          url = "http://127.0.0.1:8008/health?env=ci"
          try:
              with urllib.request.urlopen(url, timeout=5) as r:
                  data = json.loads(r.read().decode())
          except Exception as e:
              print("Health request failed:", e)
              sys.exit(1)
          if not data.get("ok", False):
              print("Health not OK:", data)
              sys.exit(1)
          print("Health OK:", data)
          PY

