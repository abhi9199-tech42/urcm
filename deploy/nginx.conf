server {
    listen 443 ssl http2;
    server_name urcm.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Optional basic auth (create /etc/nginx/.htpasswd)
    # auth_basic "Restricted";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    location /metrics {
        proxy_pass http://urcm_exporter:8008/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        # Optional token header to backend
        # proxy_set_header Authorization "Bearer $metrics_token";
    }

    location /health {
        proxy_pass http://urcm_exporter:8008/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
